<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>石器时代-精灵召唤</title>
    <link rel="stylesheet" href="styles.css?v=20260531-route" />
    <script src="app.js?v=20260531-route" defer></script>
  </head>
  <body>
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">公开资料库</p>
        <h1>石器时代-精灵召唤</h1>
        <div class="credits">
          <span>作者：烈焰部落 - 花儿</span>
          <span>赞助：战神部落族长 - 学长</span>
        </div>
        <p id="siteMeta">正在载入资料...</p>
      </div>
      <div class="summary-strip" id="summaryStrip"></div>
    </header>

    <main class="shell">
      <section class="search-band">
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索材料、出处、配方或装备" autocomplete="off" />
          <button id="searchButton">搜索</button>
        </div>
        <div class="tabs" role="tablist">
          <button class="tab active" data-view="materials">材料</button>
          <button class="tab" data-view="sources">出处</button>
          <button class="tab" data-view="recipes">配方</button>
          <button class="tab" data-view="upgrades">升级</button>
          <button class="tab" data-view="trade">交易</button>
        </div>
      </section>

      <section id="view-materials" class="view active">
        <div class="section-head">
          <h2>材料价格与出处</h2>
          <span id="materialsCount"></span>
        </div>
        <div class="table-wrap">
          <table id="materialsTable"></table>
        </div>
      </section>

      <section id="view-sources" class="view">
        <div class="section-head">
          <h2>出处掉落</h2>
          <span id="sourcesCount"></span>
        </div>
        <div id="sourceGroups" class="source-grid"></div>
      </section>

      <section id="view-recipes" class="view">
        <div class="section-head">
          <h2>配方计算</h2>
          <div class="inline-form">
            <label>目标数量 <input id="recipeTargetQty" type="number" min="1" value="1" /></label>
            <label>稳妥 <select id="recipeConfidence"><option value="0.90">90%</option><option value="0.95" selected>95%</option><option value="0.99">99%</option></select></label>
          </div>
        </div>
        <div id="recipeCards" class="card-grid"></div>
      </section>

      <section id="view-upgrades" class="view">
        <div class="section-head">
          <h2>升级材料</h2>
          <div class="inline-form">
            <label>起始 <input id="upgradeFrom" type="number" min="0" value="0" /></label>
            <label>目标 <input id="upgradeTo" type="number" min="1" value="20" /></label>
            <label>稳妥 <select id="upgradeConfidence"><option value="0.90">90%</option><option value="0.95" selected>95%</option><option value="0.99">99%</option></select></label>
          </div>
        </div>
        <div id="upgradeCards" class="card-grid"></div>
      </section>

      <section id="view-trade" class="view">
        <div class="section-head">
          <h2>交易钻石计算</h2>
          <span id="tradeRatioLabel"></span>
        </div>
        <div class="tool-grid">
          <article class="tool-panel">
            <h3>按到账反推</h3>
            <div class="tool-form">
              <label>希望对方到账 <input id="tradeTargetNet" type="number" min="0" value="10000" /></label>
              <label>交易税率 <input id="tradeTaxRate" type="number" min="0" max="99" step="0.1" value="5" /></label>
            </div>
            <div class="result-grid">
              <div class="result-box"><span>需要交易</span><strong id="tradeRequiredGross">-</strong></div>
              <div class="result-box"><span>扣税</span><strong id="tradeRequiredTax">-</strong></div>
              <div class="result-box"><span>预计到账</span><strong id="tradeGuaranteedNet">-</strong></div>
            </div>
          </article>
          <article class="tool-panel">
            <h3>按实际交易计算</h3>
            <div class="tool-form">
              <label>实际交易 <input id="tradeGross" type="number" min="0" value="10000" /></label>
            </div>
            <div class="result-grid">
              <div class="result-box"><span>对方收到</span><strong id="tradeActualNet">-</strong></div>
              <div class="result-box"><span>扣税</span><strong id="tradeActualTax">-</strong></div>
              <div class="result-box"><span>折合 RMB</span><strong id="tradeActualRmb">-</strong></div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
